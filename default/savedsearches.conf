#####################################################################
### ----- ENTERPRISE SECURITY (optional) ------------------------ ###
#####################################################################
###
### These four searches integrate Carbide with Splunk Enterprise
### Security. They ship disabled and are safe to leave disabled on
### deployments without ES.
###
### - Carbide - Risk: Security data source outage
###     Emits risk events to index=risk for tagged "security" entities
###     that are currently DOWN or CRITICAL. ES's risk framework picks
###     them up and contributes to the asset's risk score. Enable when
###     ES + the risk index are present and you've tagged at least one
###     entity with "security".
###
### - Carbide - Sync ES asset_lookup_by_str to carbide_assets
###     Copies asset criticality / owner / business_unit from ES's
###     asset_lookup_by_str into Carbide's carbide_assets collection so
###     the host status macro can enrich live status with that context.
###     Enable when ES is installed and asset_lookup_by_str is populated.
###

[Carbide - Risk: Security data source outage]
description = Emits a risk event to index=risk for every monitored entity tagged "security" that is currently DOWN or CRITICAL. ES's risk framework picks this up and contributes to the asset's risk score. Tag entities with the "security" tag (Manage entities) to opt them in. OFF_HOURS entities are excluded so scheduled off-time doesn't leak risk score contributions.
search = `carbide_all_status` \
| where (status="DOWN" OR status="CRITICAL") AND status != "OFF_HOURS" AND match(coalesce(tags,""), "(^|,)\\s*security\\s*(,|$)") \
| eval _time = now() \
| eval risk_object = case(entity_type="host", host, 1=1, entity_key) \
| eval risk_object_type = case(entity_type="host", "system", 1=1, "other") \
| eval risk_score = case(asset_criticality="critical",40, asset_criticality="high",30, asset_criticality="medium",20, asset_criticality="low",10, 1=1,20) \
| eval risk_message = "Carbide: security-tagged ".entity_type." ".entity_key." is ".status." (gap=".round(current_gap,0)."s). Security data source outage; downstream SOC visibility is reduced." \
| eval search_name = "Carbide - Risk: Security data source outage" \
| eval source = "carbide:risk" \
| table _time, risk_object, risk_object_type, risk_score, risk_message, search_name, source, entity_key, entity_type, status, asset_criticality, tags \
| collect index=risk sourcetype="stash" source="carbide:risk"
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = 3-59/5 * * * *
schedule_window = 2
enableSched = 1
dispatchAs = owner
disabled = 1
is_visible = 1

[Carbide - Sync ES asset_lookup_by_str to carbide_assets]
description = Optional. Copies asset criticality / owner / business_unit from ES's asset_lookup_by_str into Carbide's carbide_assets collection. Enable when ES is installed and the ES asset framework is populated. Safe to leave disabled.
search = | inputlookup asset_lookup_by_str \
| rename nt_host AS host, priority AS criticality, owner AS owner \
| eval business_unit = coalesce(bunit, "") \
| eval notes        = "synced from ES asset_lookup_by_str" \
| eval source       = "es_asset_sync" \
| where isnotnull(host) AND host != "" \
| fields host, criticality, owner, business_unit, notes, source \
| outputlookup carbide_assets_lookup append=true
dispatch.earliest_time = -1m
dispatch.latest_time = now
cron_schedule = 17 3 * * *
schedule_window = 30
enableSched = 1
dispatchAs = owner
disabled = 1
is_visible = 1

#####################################################################
### ----- HOUSEKEEPING ------------------------------------------- ###
#####################################################################

[Carbide - Housekeeping: trim status_history]
description = Removes carbide_status_history rows older than 30 days. Optional: only relevant if you populate the status_history collection. Disabled by default.
search = | inputlookup carbide_status_history_lookup \
| where timestamp >= relative_time(now(), "-30d") \
| outputlookup carbide_status_history_lookup
cron_schedule = 33 3 * * *
schedule_window = 30
enableSched = 0
dispatchAs = owner
disabled = 1
is_visible = 1
