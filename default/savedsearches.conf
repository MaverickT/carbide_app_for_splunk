#####################################################################
### ----- SEEDING ------------------------------------------------ ###
#####################################################################
###
### Idempotent: the seed search reads a read-only CSV under the app's
### lookups/ directory and inserts the rows into carbide_entity_filters ONLY
### when the collection is empty. On app upgrade the CSV under default/
### gets replaced but the KV-store collection is runtime data and is
### never touched - so any custom rules an admin added are preserved.
###
### To re-apply the latest seed rules after an upgrade, either:
###   - Run this search once after first clearing the collection, or
###   - Cherry-pick rows from the CSV and add them via Manage > Entity Filters.
###

[Carbide - Seed Entity Filters]
description = Idempotent: populates carbide_entity_filters from the read-only seed CSV ONLY when the collection is currently empty. Safe to run on every schedule - a no-op once seeded. Existing customizations are never overwritten.
search = | inputlookup carbide_entity_filters_seed \
| where [ \
    | inputlookup carbide_entity_filters_lookup \
    | stats count as existing \
    | eval search = if(existing=0, "1=1", "1=0") \
    | return $search \
] \
| outputlookup carbide_entity_filters_lookup append=true
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = 3 * * * *
schedule_window = 5
enableSched = 1
dispatchAs = owner
disabled = 0
is_visible = 1

[Carbide - Seed Holidays]
description = Idempotent: populates carbide_holidays from the read-only seed CSV ONLY when the collection is currently empty. Ships with Slovenian work-free days as a starting point - operators in other locales should clear the collection and re-run, or edit Manage holidays.
search = | inputlookup carbide_holidays_seed \
| where [ \
    | inputlookup carbide_holidays_lookup \
    | stats count as existing \
    | eval search = if(existing=0, "1=1", "1=0") \
    | return $search \
] \
| outputlookup carbide_holidays_lookup append=true
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = 8 * * * *
schedule_window = 5
enableSched = 1
dispatchAs = owner
disabled = 0
is_visible = 1

#####################################################################
### ----- ENTERPRISE SECURITY (optional) ------------------------ ###
#####################################################################
###
### These four searches integrate Carbide with Splunk Enterprise
### Security. They ship disabled and are safe to leave disabled on
### deployments without ES.
###
### Risk-based alerting lives on [Carbide - Alert: Hosts] itself via the
### action.risk adaptive response (ES RBA) - no separate risk search.
###
### - Carbide - Sync ES asset_lookup_by_str to carbide_assets
###     Copies asset criticality / owner / business_unit from ES's
###     asset_lookup_by_str into Carbide's carbide_assets collection so
###     the host status macro can enrich live status with that context.
###     Enable when ES is installed and asset_lookup_by_str is populated.
###

[Carbide - Sync ES asset_lookup_by_str to carbide_assets]
description = Optional. Copies asset criticality / owner / business_unit from ES's asset_lookup_by_str into Carbide's carbide_assets collection. Enable when ES is installed and the ES asset framework is populated. Safe to leave disabled.
search = | inputlookup asset_lookup_by_str \
| rename nt_host AS host, priority AS criticality, owner AS owner \
| eval business_unit = coalesce(bunit, "") \
| eval notes        = "synced from ES asset_lookup_by_str" \
| eval source       = "es_asset_sync" \
| where isnotnull(host) AND host != "" \
| dedup host \
| eval _key = host \
| fields _key, host, criticality, owner, business_unit, notes, source \
| outputlookup carbide_assets_lookup append=true key_field=_key
dispatch.earliest_time = -1m
dispatch.latest_time = now
cron_schedule = 17 3 * * *
schedule_window = 30
enableSched = 1
dispatchAs = owner
disabled = 1
is_visible = 1

