#####################################################################
### ----- HEARTBEAT ---------------------------------------------- ###
#####################################################################
###
### Snapshot searches emit events only on TRANSITIONS. That keeps the
### index tiny but makes window-bounded trend queries fragile -- if
### nothing transitioned during your time range you get no data and
### the dashboard can't reconstruct duration. Heartbeat fixes that for
### the entities that matter most (anything still non-OK) by emitting
### one event per non-OK entity every hour. Cheap, because OK entities
### (the bulk of any fleet) are skipped.
###

[Carbide - Heartbeat: Non-OK entities]
description = Emits one indexed event per still-non-OK entity per hour. Anchors window-bounded trend queries so durations and dwell-time calculations stay accurate even when no transitions happened during the query range. Excludes OFF_HOURS (scheduled off-time) entities so they don't flood the index during weekends. Reads from the cached KV row (no tstats); at most one snapshot cycle (5 min) stale, irrelevant at hourly cadence.
search = | `carbide_cached_status` \
| where status != "OK" AND status != "OFF_HOURS" \
| eval _time = now() \
| eval _raw = "entity_key=\"".entity_key."\" entity_type=".entity_type." status=".status \
            ." event_kind=heartbeat" \
            ." current_latency=".round(coalesce(current_latency,0),2)." current_gap=".round(coalesce(current_gap,0),0) \
            ." max_latency_seconds=".coalesce(max_latency_seconds,0)." max_gap_seconds=".coalesce(max_gap_seconds,0) \
            ." tracking_mode=".coalesce(tracking_mode,"-") \
| collect index=`carbide_index` sourcetype="carbide:status" source="carbide:heartbeat"
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 47 * * * *
schedule_window = 10
enableSched = 1
dispatchAs = owner
disabled = 0
is_visible = 1

#####################################################################
### ----- ALERTS -------------------------------------------------- ###
#####################################################################
###
### Each alert search runs every 5 minutes and fires whenever a monitored
### entity is in the named bad state. Suppression dedupes by entity_key for
### 30 minutes by default. Attach email / webhook / PagerDuty actions in
### local/savedsearches.conf or via the UI.
###

###
### Alerts are split BY ENTITY TYPE and BY PRIORITY BAND so that alert.severity
### (a saved-search-level setting that Splunk's Triggered Alerts UI surfaces)
### derives from asset_criticality. Each alert fires on DOWN/LATE/CRITICAL
### with per-result severity/urgency set on the notable action; suppression
### real outage isn't silenced for half an hour.
###
### Two alerts total (Hosts + Sources). Severity for the notable action is
### derived per-result from `asset_criticality` (populated by the
### Manage assets dashboard, optionally synced from ES asset_lookup_by_str).
### When no asset metadata is available (sources, or unmapped hosts), the
### fallback is `medium`. Wire your email/webhook/PagerDuty in action.email.
###

[Carbide - Alert: Hosts]
description = Monitored host entities that are currently DOWN, LATE or CRITICAL. Per-result notable severity/urgency derived from asset_criticality (Manage assets) with "medium" fallback. Reads from the cached KV row (no tstats invocation per cycle). Fires notable (no-op without ES) + email (no-op until action.email.to is filled in).
search = | `carbide_cached_host_status` \
| where (status="DOWN" OR status="LATE" OR status="CRITICAL") \
| eval notable_severity = case(asset_criticality="critical","critical", asset_criticality="high","high", asset_criticality="medium","medium", asset_criticality="low","low", 1=1,"medium") \
| eval notable_urgency  = notable_severity
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = 3-59/5 * * * *
schedule_window = 2
enableSched = 1
dispatchAs = owner
disabled = 0
is_visible = 1
is_scheduled = 1
alert.track = 1
alert.severity = 4
### Per-result mode (digest_mode=0) is required for two reasons: field-based
### throttling (alert.suppress.fields) only applies per result, and the
### notable/email $result.*$ tokens resolve per result. With digest mode the
### 30-minute suppression would silence ALL entities once ANY entity fired.
alert.digest_mode = 0
alert.expires = 24h
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = entity_key
counttype = number of events
relation = greater than
quantity = 0
###
### --- Actions ---
### Notable urgency/severity is per-result from $result.notable_*$, so a
### single saved-search dispatch produces correctly-banded ES notable events.
### Email is a no-op until action.email.to is filled in.
###
actions = notable,email
action.notable                       = 1
action.notable.param.rule_name       = Carbide: host $result.entity_key$ - $result.status$
action.notable.param.rule_title      = Carbide host outage: $result.entity_key$ ($result.status$)
action.notable.param.rule_description = Carbide detected $result.status$ on host entity $result.entity_key$ (tracking_mode=$result.tracking_mode$). Last event: $result.last_event_time$. Current gap: $result.current_gap$s. Owner: $result.asset_owner$ ($result.asset_bu$). Asset criticality: $result.asset_criticality$.
action.notable.param.security_domain = infrastructure
action.notable.param.severity        = $result.notable_severity$
action.notable.param.urgency         = $result.notable_urgency$
action.notable.param.owner           = unassigned
action.notable.param.status          = 1
action.notable.param.drilldown_name  = View live status in Carbide
action.notable.param.drilldown_search = | `carbide_host_status` | search entity_key="$result.entity_key$"

action.email                       = 1
action.email.to                    =
action.email.subject               = [Carbide] $result.entity_type$ $result.entity_key$ is $result.status$
action.email.message.alert         = Carbide alert: $name$\n\nEntity: $result.entity_key$\nStatus: $result.status$\nAsset criticality: $result.asset_criticality$\nTracking mode: $result.tracking_mode$\nLast event: $result.last_event_time$\nCurrent gap (s): $result.current_gap$\nCurrent latency (s): $result.current_latency$\nOwner: $result.asset_owner$\nBusiness unit: $result.asset_bu$\n\nFull list of triggered entities: $results_link$
action.email.format                = html
action.email.include.results_link  = 1
action.email.include.search        = 0
action.email.include.trigger       = 1
action.email.sendresults           = 1
action.email.inline                = 0

[Carbide - Alert: Sources]
description = Monitored source entities that are currently DOWN, LATE or CRITICAL. Sources don't carry asset_criticality (they're not hosts), so notable severity/urgency default to "medium". Reads from the cached KV row.
search = | `carbide_cached_source_status` \
| where (status="DOWN" OR status="LATE" OR status="CRITICAL") \
| eval notable_severity = "medium" \
| eval notable_urgency  = "medium"
