###
### Carbide for Splunk - scheduled searches and alerts
###
### Conventions
### -----------
### * Discovery searches enumerate live (index, host, source, sourcetype)
###   combinations via `tstats` and insert NEW rows into the tracked-entity
###   KV stores. Existing rows are preserved.
### * Status snapshot writes current latency, gap and status back to each
###   tracked KV row + appends to the `summary` index for trending.
### * Alert searches run every five minutes and fire if any monitored entity
###   is DOWN, LATE or CRITICAL. Actions (email/webhook/PagerDuty/...) are
###   left for the admin to wire up. Suppression defaults to 30 minutes so
###   the same outage doesn't page repeatedly.
### * Searches that mutate the KV stores have `disabled = 0` so they run as
###   soon as the app is installed. Discovery searches for non-default
###   tracking modes ship `disabled = 1` - admins enable them when wanted.
###

#####################################################################
### ----- DISCOVERY (HOSTS) --------------------------------------- ###
#####################################################################

[Carbide - Discover hosts (advanced: host and sourcetype)]
description = Discover new (host, sourcetype) entities and seed them into carbide_tracked_hosts with monitored=0 and default thresholds. Disabled by default; enable when you want per-sourcetype granularity - catches a single sourcetype going quiet while the host keeps logging everything else.
search = | `carbide_discover(hosts, host_sourcetype, host sourcetype)` \
| eval index="*", source="*" \
| eval tracking_mode="host_sourcetype" \
| eval entity_key="host=".host."|sourcetype=".sourcetype \
| lookup carbide_tracked_hosts_lookup entity_key OUTPUT _key as existing_key \
| where isnull(existing_key) \
| eval monitored          = `carbide_default_monitored` \
| eval max_latency_seconds = `carbide_default_max_latency` \
| eval max_gap_seconds     = `carbide_default_max_gap` \
| eval first_seen          = now() \
| eval last_updated        = now() \
| eval last_status         = "NEW" \
| eval maintenance_from    = 0 \
| eval maintenance_until   = 0 \
| eval monitoring_schedule = `carbide_default_monitoring_schedule` \
| eval tags                = "" \
| eval notes               = "auto-discovered" \
| eval _scope_key = "hosts|host_sourcetype" \
| lookup carbide_autowatch_lookup scope_pattern AS _scope_key, index_pattern AS index, host_pattern AS host, source_pattern AS source, sourcetype_pattern AS sourcetype OUTPUT rule_name AS ob_rule, watch AS ob_watch, monitoring_schedule AS ob_schedule, max_gap_seconds AS ob_gap, max_latency_seconds AS ob_latency, tags AS ob_tags \
| eval monitored           = coalesce(ob_watch, monitored) \
| eval monitoring_schedule = if(isnotnull(ob_schedule) AND ob_schedule!="", ob_schedule, monitoring_schedule) \
| eval max_gap_seconds     = if(isnotnull(ob_gap) AND ob_gap>0, ob_gap, max_gap_seconds) \
| eval max_latency_seconds = if(isnotnull(ob_latency) AND ob_latency>0, ob_latency, max_latency_seconds) \
| eval tags                = if(isnotnull(ob_tags) AND ob_tags!="", ob_tags, tags) \
| eval notes               = if(isnotnull(ob_rule), "auto-discovered; matched rule: ".ob_rule, notes) \
| fields entity_key, index, host, source, sourcetype, tracking_mode, monitored, max_latency_seconds, max_gap_seconds, first_seen, last_updated, last_status, last_event_time, notes, maintenance_from, maintenance_until, monitoring_schedule, tags \
| outputlookup carbide_tracked_hosts_lookup append=true
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
cron_schedule = 12 */4 * * *
schedule_window = 5
enableSched = 1
dispatchAs = owner
disabled = 1
is_visible = 1

