#####################################################################
### ----- STATUS SNAPSHOT (writeback + summary index) ------------ ###
#####################################################################

[Carbide - Status Snapshot: Hosts]
description = Re-evaluates every monitored host entity. Writes back to the KV row ONLY when status changed or last_event_time advanced (skipping pure steady-state cycles); emits a transition event to the carbide index ONLY when the status itself changed (or on first observation). Persists last_status, last_event_time, last_latency so alerts + Home + Overview can read from KV instead of re-running tstats.
search = `carbide_host_status` \
| eval last_status_new = status \
| eval last_updated    = now() \
| eval last_event_time = coalesce(last_event_time, 0) \
| eval last_latency    = coalesce(current_latency, 0) \
| eval changed_status  = (status != coalesce(previous_status,"") AND coalesce(previous_status,"")!="") \
| eval first_observation = (isnull(previous_status) OR previous_status="" OR previous_status="NEW") \
| eval advanced_event_time = (last_event_time > coalesce(previous_last_event_time, 0)) \
| eval needs_writeback = (changed_status OR first_observation OR advanced_event_time) \
| where needs_writeback \
| appendpipe [ \
    eval last_status = last_status_new \
    | fields _key, entity_key, index, host, source, sourcetype, tracking_mode, \
           monitored, max_latency_seconds, max_gap_seconds, \
           first_seen, last_updated, last_status, last_event_time, last_latency, notes, \
           maintenance_from, maintenance_until, monitoring_schedule, tags \
    | outputlookup carbide_tracked_hosts_lookup append=true key_field=_key \
    | where 1=0 \
] \
| where (changed_status OR first_observation) \
        AND NOT (status="OFF_HOURS" OR (coalesce(previous_status,"")="OFF_HOURS" AND status="OK")) \
| eval previous_status = coalesce(previous_status, "NEW") \
| eval _time = now() \
| eval _raw = "entity_key=\"".entity_key."\" entity_type=host status=".status \
            ." previous_status=".previous_status \
            ." current_latency=".round(current_latency,2)." current_gap=".round(current_gap,0) \
            ." max_latency_seconds=".max_latency_seconds." max_gap_seconds=".max_gap_seconds \
            ." asset_criticality=".coalesce(asset_criticality, "-") \
            ." tracking_mode=".tracking_mode \
| collect index=`carbide_index` sourcetype="carbide:status" source="carbide"
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = 0-59/5 * * * *
schedule_window = 2
enableSched = 1
dispatchAs = owner
disabled = 0
is_visible = 1

