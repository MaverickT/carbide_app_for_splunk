###
### Carbide for Splunk - KV Store collections
###

#
# carbide_tracked_hosts
# One row per tracked (index, host[, source][, sourcetype]) combination.
# tracking_mode is one of: index_host, host_source, host_sourcetype.
# When a dimension is not used by the chosen mode the field is stored as "*".
#
[carbide_tracked_hosts]
enforceTypes = true
replicate = true
field.entity_key = string
field.index = string
field.host = string
field.source = string
field.sourcetype = string
field.tracking_mode = string
field.monitored = number
field.max_latency_seconds = number
field.max_gap_seconds = number
field.first_seen = number
field.last_updated = number
field.last_status = string
field.last_event_time = number
# Latency that was current at the most recent snapshot run. Persisted so
# alerts and the Home / Overview dashboards can avoid re-running tstats.
field.last_latency = number
field.notes = string
# Maintenance window. Status macro reports MAINT (and alerts skip) when
# coalesce(maintenance_from,0) <= now() < coalesce(maintenance_until,0).
# Set maintenance_from to a future epoch to schedule a window ahead of time;
# null/0 means "starts immediately". maintenance_until = 0 or null disables.
field.maintenance_from  = number
field.maintenance_until = number
# Free-form, comma-separated tags for ad-hoc grouping (e.g. "prod,payments").
field.tags = string
accelerated_fields.idx_entity_key = {"entity_key": 1}
accelerated_fields.idx_monitored  = {"monitored": 1}

#
# carbide_tracked_sources
# One row per tracked (index, source) or (index, sourcetype) combination.
# tracking_mode is one of: index_source, index_sourcetype.
#
[carbide_tracked_sources]
enforceTypes = true
replicate = true
field.entity_key = string
field.index = string
field.source = string
field.sourcetype = string
field.tracking_mode = string
field.monitored = number
field.max_latency_seconds = number
field.max_gap_seconds = number
field.first_seen = number
field.last_updated = number
field.last_status = string
field.last_event_time = number
# Latency that was current at the most recent snapshot run. Persisted so
# alerts and the Home / Overview dashboards can avoid re-running tstats.
field.last_latency = number
field.notes = string
field.maintenance_from  = number
field.maintenance_until = number
# Recurring time-of-day / day-of-week schedule. One of:
#   "247"            - always monitored (default).
#   "weekdays"       - Mon-Fri only; weekends + holidays are OFF_HOURS.
#   "business_hours" - Mon-Fri within business_hours_start/end; otherwise OFF_HOURS.
# Null/missing is treated as "247" by the status macro.
field.monitoring_schedule = string
field.tags = string
accelerated_fields.idx_entity_key = {"entity_key": 1}
accelerated_fields.idx_monitored  = {"monitored": 1}

#
# carbide_settings
# Key/value store for global defaults the UI exposes on the Settings page.
# Recognised keys: default_max_latency_seconds, default_max_gap_seconds,
# default_monitored, default_monitoring_schedule, business_hours_start,
# business_hours_end.
#
[carbide_settings]
enforceTypes = true
replicate = true
field.setting_key = string
field.setting_value = string
accelerated_fields.idx_setting_key = {"setting_key": 1}

#
# carbide_entity_filters
# Per-tracking-type include/exclude rules on ANY of (index, host, source,
# sourcetype). Use this to keep noisy axes out of monitoring -- e.g. exclude
# the per-hour rotating `source` of syslog devices while including the
# meaningful `source` of Windows event-log forwarders.
#
# field_name    : "index" | "host" | "source" | "sourcetype"
# pattern       : value (supports Splunk wildcards: '*' and '?')
# mode          : "include" (whitelist) | "exclude" (blacklist)
# tracking_type : "hosts" | "sources" | "both"
#
# Behaviour (applied to discovery + live status searches):
#   - rows with mode=include for a field -> only those patterns count
#   - rows with mode=exclude for a field -> everything except those
#   - both modes for the same field      -> include intersected with exclude
#   - multiple fields                    -> ANDed together
#
[carbide_entity_filters]
enforceTypes = true
replicate = true
field.field_name = string
field.pattern = string
field.mode = string
field.tracking_type = string
field.notes = string
accelerated_fields.idx_type_mode  = {"tracking_type": 1, "mode": 1}
accelerated_fields.idx_field_name = {"field_name": 1}

#
# carbide_assets
# Per-host asset metadata that the host status macro joins to surface
# criticality / owner / business unit alongside the live state. Populate
# manually from the Manage assets dashboard, OR sync from Splunk Enterprise
# Security's asset_lookup_by_str via the optional saved search shipped with
# the app. The whole enrichment path is opt-in: empty collection = no
# enrichment, no errors.
#
[carbide_assets]
enforceTypes = true
replicate = true
field.host = string
field.criticality = string
field.owner = string
field.business_unit = string
field.notes = string
field.source = string
accelerated_fields.idx_host = {"host": 1}

#
# carbide_holidays
# Global holiday calendar consulted by the OFF_HOURS check. Two date formats
# are supported in the same `date` column:
#   - "YYYY-MM-DD"  with recurring=0  -> matches that exact day only.
#   - "MM-DD"       with recurring=1  -> matches every year on that month/day.
# Admins populate via the Manage holidays dashboard. The collection ships
# empty; holidays are too locale-specific to seed sensibly.
#
[carbide_holidays]
enforceTypes = true
replicate = true
field.date = string
field.name = string
field.recurring = number
field.notes = string
accelerated_fields.idx_date = {"date": 1}

#
# carbide_status_history
# Optional short-term status snapshots written by the status snapshot search.
# Long-term history should go to a summary index; this collection is the
# fallback when summary indexing isn't desired.
#
[carbide_status_history]
enforceTypes = true
replicate = true
field.timestamp = number
field.entity_key = string
field.entity_type = string
field.status = string
field.current_latency = number
field.current_gap = number
accelerated_fields.idx_timestamp  = {"timestamp": 1}
accelerated_fields.idx_entity_key = {"entity_key": 1}
