###
### Carbide for Splunk - SPL macros
###
### All discovery and status macros rely on `tstats` against indexed metadata
### so they never scan raw events. Defaults are set in `carbide_default_*`
### below; to change one, edit the macro (Settings > Advanced search >
### Search macros). The Settings dashboard documents each key.
###
### Tip: macros.conf joins continuation lines with a backslash. A continuation
### line that needs to introduce a new SPL command must start with `|`.
###
### CALLING CONVENTION: generating macros (tstats / inputlookup / union at
### the top) deliberately do NOT include their leading pipe. Callers must
### invoke them as `| `macro``. If the macro were the first token without a
### pipe, Splunk prepends the implicit `search` command and the dispatch
### fails with "Error in 'X' command: This command must be the first command
### of a search" (verified live on Splunk 10.4, 2026-07-02).
###

###
### --- Defaults --------------------------------------------------------------
###

[carbide_default_max_latency]
definition = 600
iseval = 0

[carbide_default_max_gap]
definition = 3600
iseval = 0

[carbide_default_monitored]
definition = 0
iseval = 0

# Volume-drop detection: alert when the 24h event count falls below this
# percent of the entity's learned baseline. 0 = disabled (the default:
# volume monitoring is opt-in per entity or via auto-watch rules).
[carbide_default_min_volume_pct]
definition = 0
iseval = 0

# EMA smoothing factor for the volume baseline, applied once per 5-min
# snapshot cycle while the entity is OK/LATE: baseline += alpha * (count
# - baseline). 0.005 = roughly a 1.5-day memory. The baseline never
# updates while the entity is DOWN/CRITICAL/LOW_VOLUME, so outages don't
# drag it down.
[carbide_volume_baseline_alpha]
definition = 0.005
iseval = 0

# An entity is "stale" when it has produced no events for this long
# (falls back to first_seen when it never produced any). Consumed by the
# disabled housekeeping searches; the Manage entities "Stale" filter
# uses the same 30 days client-side.
[carbide_stale_after_seconds]
definition = 2592000
iseval = 0

# Grace after a scheduled entity's monitoring window reopens
# (business_hours / weekdays): DOWN/LATE are held for this long so a
# weekend-idle feed isn't flagged the instant Monday morning starts. If
# fresh data arrives during the window the status clears immediately.
# Overridden per entity by offhours_grace_seconds (0/null = use this).
# Default 1 hour.
[carbide_default_offhours_grace]
definition = 3600
iseval = 0

[carbide_default_monitoring_schedule]
definition = "247"
iseval = 0

# Business-hours window used when monitoring_schedule="business_hours".
# HHMM format as an integer (e.g. 800 for 08:00, 1600 for 16:00).
# Compared to strftime(now(),"%H%M") which is also HHMM.
[carbide_default_business_hours_start]
definition = 800
iseval = 0

[carbide_default_business_hours_end]
definition = 1600
iseval = 0

# Look-back window when discovering new entities.
[carbide_discovery_window]
definition = -7d@h
iseval = 0

# Look-back window for the live-status tstats. Kept short on purpose: it
# only has to catch RECENT events (for latency + the volume count). The
# GAP check does NOT depend on this window - the status macros coalesce
# last_event_time with the value persisted in the KV row, so an entity
# quieter than this window (e.g. a weekly feed with a multi-day
# max_gap_seconds) still reports its true gap instead of a false DOWN.
# Only lengthen this if you need latency/volume computed for sources
# that emit less than once a day.
[carbide_status_window]
definition = -24h@h
iseval = 0

# Dedicated index where status snapshots, transitions, heartbeats and audit
# events land. The app does NOT create this index - create it yourself
# on the indexer tier (or standalone SH). See README for the steps to
# rename it (this macro + recreate the index
# + restart).
[carbide_index]
definition = carbide
iseval = 0

# Timezone note: strftime() only accepts (time, format) - no timezone arg.
# All weekend / business-hours / holiday checks use the search head's local
# timezone (which for scheduled searches equals the dispatching owner's tz
# preference, defaulting to the server tz). If you need a specific tz for
# these checks, set the Splunk server tz globally via server.conf's [general]
# stanza. There is no per-macro tz override available in Splunk.

# How long after discovery to grant a "grace period" before flagging an
# entity as DOWN. Entities younger than this are reported as NEW even if no
# events arrive. Default: 30 minutes.
[carbide_grace_period]
definition = 1800
iseval = 0

# Minimum number of events an (index/host/sourcetype) combination must have
# in the discovery window to be auto-inserted. Filters single-event noise.
[carbide_min_event_count]
definition = 5
iseval = 0

###
### --- Defaults consumption note --------------------------------------------
### Discovery and status macros read their defaults from `carbide_default_*`
### macros above (plain text macros — simple substitution, no runtime cost).
### To change a default, admin edits the macro directly via:
###   Settings > Advanced search > Search macros > carbide_default_<key>
### An earlier setting_num/setting_str subsearch pattern (backed by a
### carbide_settings KV collection) was tried but Splunk 10.4's parser
### rejects subsearches as eval RHS, so that route was dropped in favor
### of plain macro substitution and the collection was removed.
###

###
### --- Entity filter ---------------------------------------------------------
### Returns a search clause that include/excludes (index, host, source,
### sourcetype) values based on rows in carbide_entity_filters.
###
### Rule scoping (the tracking_type column of a filter row):
###   "both"                   applies everywhere
###   "hosts" / "sources"      applies to every mode on that axis
###   a specific mode name     applies ONLY to that mode's discovery:
###     index_host | host_source | host_sourcetype |
###     index_source | index_sourcetype
### Mode-scoped rules let two discovery modes on the same axis carve up the
### estate - e.g. include index=netdev* only for index_source discovery and
### exclude the same indexes from index_sourcetype discovery.
###
### Two arities:
###   `carbide_entity_filter(<axis>)`          axis + "both" rules only.
###     Used by the STATUS and SUGGESTION tstats, which span all modes of an
###     axis at once (scoping there comes from the monitored-entity
###     constraint; mode-scoped rules gate discovery only).
###   `carbide_entity_filter(<axis>, <mode>)`  axis + mode + "both" rules.
###     Used by each discovery search via `carbide_discover`.
###
### Per-field semantics (field_name = index | host | source | sourcetype):
###   - no rows for the field     -> no constraint on that field
###   - rows mode=include         -> whitelist (OR of patterns)
###   - rows mode=exclude         -> blacklist (NOT OR of patterns)
###   - both modes for one field  -> intersected with each other
### Across fields the per-field clauses are ANDed.
###
### Patterns support Splunk wildcards (`*` and `?`).
###
### Note: the dedicated `carbide_index` is *additionally* excluded by the
### discovery and status macros (so the app cannot self-monitor).
###
### The clause ALWAYS starts with the positive scope
### `(index=* OR index=_*)`. Without a positive index term, tstats falls
### back to the role's DEFAULT search indexes (verified live 2026-07-02:
### exclude-only filters made discovery return zero rows). Internal
### indexes are then removed again by the seed `_*` exclude rule -- delete
### that rule if you genuinely want to monitor _internal.
###
### Used by tstats searches like:
###   | tstats ... where `carbide_entity_filter("hosts")` ...
###

[carbide_entity_filter(1)]
args = tracking_type
definition = `carbide_entity_filter($tracking_type$, $tracking_type$)`

[carbide_entity_filter(2)]
args = tracking_type, tracking_mode
definition = [ \
    | makeresults \
    | fields - _time \
    | eval _tmp=1 \
    | join type=left _tmp [ \
        | inputlookup carbide_entity_filters_lookup where tracking_type="$tracking_type$" OR tracking_type="$tracking_mode$" OR tracking_type="both" \
        | eval _tmp=1 \
        | where field_name IN ("index","host","source","sourcetype") AND mode IN ("include","exclude") AND isnotnull(pattern) AND pattern!="" \
        | eval clause = field_name."=\"".pattern."\"" \
        | stats \
            values(eval(if(mode="include", clause, null()))) as inc_clauses, \
            values(eval(if(mode="exclude", clause, null()))) as exc_clauses \
            by _tmp, field_name \
        | eval inc_expr = if(mvcount(inc_clauses)>0, "(" . mvjoin(inc_clauses, " OR ") . ")", null()) \
        | eval exc_expr = if(mvcount(exc_clauses)>0, "(NOT (" . mvjoin(exc_clauses, " OR ") . "))", null()) \
        | eval per_field = mvappend(inc_expr, exc_expr) \
        | mvexpand per_field \
        | stats values(per_field) as all_clauses by _tmp \
    ] \
    | eval scope  = "(index=* OR index=_*)" \
    | eval search = if(mvcount(all_clauses)>0, scope . " AND " . mvjoin(all_clauses, " AND "), scope) \
    | return $search \
]

###
### --- Today-is-holiday subsearch -------------------------------------------
### Subsearch that returns a literal 1 or 0 for "is today a holiday".
### Single inputlookup, handles both fixed-date (YYYY-MM-DD, recurring=0)
### and recurring (MM-DD, recurring=1) rows. The scalar broadcasts to every
### row of the parent search at parse time.
###
### Usage: `| `carbide_today_is_holiday`` — adds an `_is_holiday` (0/1)
### field to every row via two lookups (fixed-date + recurring). Two
### lookups because the same lookup can't be matched with two different
### keys in one call. Both use unique OUTPUT aliases so they don't
### overwrite each other.

[carbide_today_is_holiday]
definition = eval _today_iso = strftime(now(), "%Y-%m-%d") \
| eval _today_md = strftime(now(), "%m-%d") \
| lookup carbide_holidays_lookup date AS _today_iso OUTPUT name AS _hol_fixed \
| lookup carbide_holidays_lookup date AS _today_md OUTPUT name AS _hol_recur \
| eval _is_holiday = if(isnotnull(_hol_fixed) OR isnotnull(_hol_recur), 1, 0) \
| fields - _today_iso _today_md _hol_fixed _hol_recur

###
### --- Off-hours check --------------------------------------------------------
### Shared derivation used by every status macro (live + cached): sets
### is_off_hours from the row's monitoring_schedule, the weekday/clock,
### and the holiday calendar. Kept in ONE place - this block used to be
### copy-pasted five times.
###

[carbide_off_hours_check]
definition = eval _now_dow        = tonumber(strftime(now(), "%w")) \
| eval _now_hhmm       = tonumber(strftime(now(), "%H%M")) \
| eval _bh_start       = `carbide_default_business_hours_start` \
| eval _bh_end         = `carbide_default_business_hours_end` \
| `carbide_today_is_holiday` \
| eval _is_weekend     = if(_now_dow=0 OR _now_dow=6, 1, 0) \
| eval _eff_sched      = coalesce(monitoring_schedule, "247") \
| eval is_off_hours = case( \
    _eff_sched="weekdays" AND (_is_weekend=1 OR _is_holiday=1),                                                          1, \
    _eff_sched="business_hours" AND (_is_weekend=1 OR _is_holiday=1 OR _now_hhmm < _bh_start OR _now_hhmm >= _bh_end),   1, \
    1=1,                                                                                                                  0 \
) \
| fields - _now_dow, _now_hhmm, _bh_start, _bh_end, _is_weekend, _eff_sched, _is_holiday

###
### --- Discovery ---------------------------------------------------------------
### One row per live combination of the fields in $split$ (space-separated
### tstats group-by list) over the configured discovery window, gated by
### carbide_min_event_count.
###
### Group by ONLY the fields the calling tracking mode needs. Grouping by
### `source` on estates with rotating file paths (syslog, dated logs)
### multiplies tstats cardinality on every indexer -- it is the single most
### expensive thing this app can do, so only the disabled-by-default
### source-path modes ever ask for it.
###
### Usage: | `carbide_discover(hosts, host_sourcetype, host sourcetype)`
###   arg 1: axis ("hosts" | "sources") - selects axis-level filter rules
###   arg 2: tracking mode - selects mode-scoped filter rules
###   arg 3: tstats group-by field list (space-separated)
###

[carbide_discover(3)]
args = tracking_type, tracking_mode, split
definition = tstats \
    max(_time)      as last_event_time, \
    count \
    where `carbide_entity_filter("$tracking_type$", "$tracking_mode$")` AND index!=`carbide_index` earliest=`carbide_discovery_window` \
    by $split$ \
| where count >= `carbide_min_event_count`

###
### --- Host status -----------------------------------------------------------
### For every tracked, monitored host entity:
###   - pulls the latest event time + average ingest latency from tstats
###   - joins KV-store thresholds via entity_key (via the append + stats
###     pattern, NOT join - so no 50k row cap)
###   - classifies as MAINT / NEW / OK / LATE / DOWN / CRITICAL
###
### Status:
###   MAINT     = coalesce(maintenance_until, 0) > now() (snoozed by admin)
###   NEW       = entity younger than carbide_grace_period and no events yet
###   LATE      = events still arriving but ingest latency > max_latency
###   DOWN      = no events at all within max_gap
###   CRITICAL  = LATE and DOWN simultaneously
###   OK        = none of the above
###
### Performance notes:
###   - The tstats `where` clause embeds a subsearch that formats the
###     monitored KV rows into (index AND host AND source AND sourcetype)
###     OR-terms ("*" dims match everything), so the indexers only aggregate
###     events belonging to monitored entities. Cost scales with what you
###     watch, not with the estate; with nothing monitored the tstats
###     matches nothing (sentinel host). The subsearch itself is one KV read.
###     Caveat: subsearch expansion caps at ~10k rows -- above 10k monitored
###     entities raise limits.conf [subsearch] maxout or the constraint
###     silently truncates and truncated entities read as DOWN.
###   - current_latency = latest(_indextime) - max(_time): the ingest delay
###     of the NEWEST event. tstats refuses everything else ("_time
###     aggregations are not yet supported except for count/min/max/range/
###     earliest/latest", verified live 2026-07-02) -- no avg(_time), no
###     avg(eval(_indextime - _time)). Latest-event delay is also the more
###     alert-relevant definition: it reflects now, not a 24h average.
###   - The subsearch below the tstats produces every possible entity_key
###     for each live row (index_host, host_source, host_sourcetype) and
###     aggregates by entity_key so the lookup lines up with the
###     corresponding tracking_mode in the KV store.
###

[carbide_host_status]
definition = inputlookup carbide_tracked_hosts_lookup where monitored=1 \
| rename last_event_time as previous_last_event_time, \
         last_status     as previous_status \
| append [ \
    | tstats \
        max(_time)      as live_last_event_time, \
        latest(_indextime) as live_latest_indextime, \
        count           as live_event_count \
        where `carbide_entity_filter("hosts")` AND index!=`carbide_index` \
              AND [ | inputlookup carbide_tracked_hosts_lookup where monitored=1 \
                    | table index, host, source, sourcetype \
                    | append [ | makeresults | eval host = "__carbide_no_monitored_entities__" | table host ] \
                    | format ] \
              earliest=`carbide_status_window` \
        by index, host, sourcetype, source \
    | eval live_current_latency = max(0, live_latest_indextime - live_last_event_time) \
    | eval ek_ih  = "index=".index."|host=".host \
    | eval ek_hs  = "host=".host."|source=".source \
    | eval ek_hst = "host=".host."|sourcetype=".sourcetype \
    | eval entity_key = mvappend(ek_ih, ek_hs, ek_hst) \
    | mvexpand entity_key \
    | fields entity_key, live_last_event_time, live_current_latency, live_event_count \
    | stats \
        max(live_last_event_time) as live_last_event_time, \
        avg(live_current_latency) as live_current_latency, \
        sum(live_event_count)     as live_event_count \
        by entity_key \
] \
| stats \
    values(_key) as _key, \
    values(index) as index, \
    values(host) as host, \
    values(source) as source, \
    values(sourcetype) as sourcetype, \
    values(tracking_mode) as tracking_mode, \
    values(monitored) as monitored, \
    values(max_latency_seconds) as max_latency_seconds, \
    values(max_gap_seconds) as max_gap_seconds, \
    values(first_seen) as first_seen, \
    values(last_updated) as last_updated, \
    values(previous_status) as previous_status, \
    values(previous_last_event_time) as previous_last_event_time, \
    values(notes) as notes, \
    values(maintenance_from) as maintenance_from, \
    values(maintenance_until) as maintenance_until, \
    values(monitoring_schedule) as monitoring_schedule, \
    values(tags) as tags, \
    values(min_volume_pct) as min_volume_pct, \
    values(baseline_epc) as baseline_epc, \
    values(reviewed) as reviewed, \
    values(offhours_grace_seconds) as offhours_grace_seconds, \
    values(on_hours_since) as on_hours_since, \
    max(live_last_event_time) as last_event_time, \
    avg(live_current_latency) as current_latency, \
    sum(live_event_count)     as event_count \
    by entity_key \
| where isnotnull(_key) \
| eval last_event_time = coalesce(last_event_time, previous_last_event_time) \
| eval current_gap     = if(isnull(last_event_time), 9999999, now() - last_event_time) \
| eval current_latency = coalesce(current_latency, 0) \
| eval event_count     = coalesce(event_count, 0) \
| eval in_maintenance  = if(coalesce(maintenance_from, 0) <= now() AND coalesce(maintenance_until, 0) > now(), 1, 0) \
| eval in_grace        = if(isnull(last_event_time) AND (now() - coalesce(first_seen, 0)) < `carbide_grace_period`, 1, 0) \
| `carbide_off_hours_check` \
| eval on_hours_since = case( \
    is_off_hours=1,                        null(), \
    coalesce(previous_status,"")="OFF_HOURS", now(), \
    isnotnull(on_hours_since),             on_hours_since, \
    1=1,                                   null() \
) \
| eval _grace_secs = if(coalesce(offhours_grace_seconds,0) > 0, offhours_grace_seconds, `carbide_default_offhours_grace`) \
| eval in_offhours_grace = if(is_off_hours=0 AND isnotnull(on_hours_since) AND (now() - on_hours_since) < _grace_secs, 1, 0) \
| eval status = case( \
    in_maintenance=1,                                                        "MAINT", \
    is_off_hours=1,                                                          "OFF_HOURS", \
    in_grace=1,                                                              "NEW", \
    in_offhours_grace=1,                                                     "SETTLING", \
    isnull(last_event_time),                                                 "DOWN", \
    current_gap > max_gap_seconds AND current_latency > max_latency_seconds, "CRITICAL", \
    current_gap > max_gap_seconds,                                           "DOWN", \
    current_latency > max_latency_seconds,                                   "LATE", \
    coalesce(min_volume_pct,0) > 0 AND coalesce(baseline_epc,0) > 0 AND event_count < baseline_epc * min_volume_pct / 100, "LOW_VOLUME", \
    1=1,                                                                     "OK" \
) \
| eval entity_type = "host" \
| lookup carbide_assets_lookup host OUTPUTNEW criticality AS asset_criticality, owner AS asset_owner, business_unit AS asset_bu \
| table _key, entity_type, entity_key, tracking_mode, index, host, source, sourcetype, \
        monitored, max_latency_seconds, max_gap_seconds, min_volume_pct, baseline_epc, maintenance_from, maintenance_until, \
        monitoring_schedule, is_off_hours, tags, reviewed, offhours_grace_seconds, on_hours_since, \
        last_event_time, current_latency, current_gap, \
        event_count, status, in_maintenance, first_seen, last_updated, \
        previous_status, previous_last_event_time, notes, \
        asset_criticality, asset_owner, asset_bu

###
### --- Source status ---------------------------------------------------------
### Same idea as carbide_host_status but on the (index, source/sourcetype)
### axis instead. Same monitored-entity tstats constraint + native-field
### latency derivation; see the performance notes above.
###

[carbide_source_status]
definition = inputlookup carbide_tracked_sources_lookup where monitored=1 \
| rename last_event_time as previous_last_event_time, \
         last_status     as previous_status \
| append [ \
    | tstats \
        max(_time)      as live_last_event_time, \
        latest(_indextime) as live_latest_indextime, \
        count           as live_event_count \
        where `carbide_entity_filter("sources")` AND index!=`carbide_index` \
              AND [ | inputlookup carbide_tracked_sources_lookup where monitored=1 \
                    | table index, source, sourcetype \
                    | append [ | makeresults | eval index = "__carbide_no_monitored_entities__" | table index ] \
                    | format ] \
              earliest=`carbide_status_window` \
        by index, source, sourcetype \
    | eval live_current_latency = max(0, live_latest_indextime - live_last_event_time) \
    | eval ek_is  = "index=".index."|source=".source \
    | eval ek_ist = "index=".index."|sourcetype=".sourcetype \
    | eval entity_key = mvappend(ek_is, ek_ist) \
    | mvexpand entity_key \
    | fields entity_key, live_last_event_time, live_current_latency, live_event_count \
    | stats \
        max(live_last_event_time) as live_last_event_time, \
        avg(live_current_latency) as live_current_latency, \
        sum(live_event_count)     as live_event_count \
        by entity_key \
] \
| stats \
    values(_key) as _key, \
    values(index) as index, \
    values(source) as source, \
    values(sourcetype) as sourcetype, \
    values(tracking_mode) as tracking_mode, \
    values(monitored) as monitored, \
    values(max_latency_seconds) as max_latency_seconds, \
    values(max_gap_seconds) as max_gap_seconds, \
    values(first_seen) as first_seen, \
    values(last_updated) as last_updated, \
    values(previous_status) as previous_status, \
    values(previous_last_event_time) as previous_last_event_time, \
    values(notes) as notes, \
    values(maintenance_from) as maintenance_from, \
    values(maintenance_until) as maintenance_until, \
    values(monitoring_schedule) as monitoring_schedule, \
    values(tags) as tags, \
    values(min_volume_pct) as min_volume_pct, \
    values(baseline_epc) as baseline_epc, \
    values(reviewed) as reviewed, \
    values(offhours_grace_seconds) as offhours_grace_seconds, \
    values(on_hours_since) as on_hours_since, \
    max(live_last_event_time) as last_event_time, \
    avg(live_current_latency) as current_latency, \
    sum(live_event_count)     as event_count \
    by entity_key \
| where isnotnull(_key) \
| eval last_event_time = coalesce(last_event_time, previous_last_event_time) \
| eval current_gap     = if(isnull(last_event_time), 9999999, now() - last_event_time) \
| eval current_latency = coalesce(current_latency, 0) \
| eval event_count     = coalesce(event_count, 0) \
| eval in_maintenance  = if(coalesce(maintenance_from, 0) <= now() AND coalesce(maintenance_until, 0) > now(), 1, 0) \
| eval in_grace        = if(isnull(last_event_time) AND (now() - coalesce(first_seen, 0)) < `carbide_grace_period`, 1, 0) \
| `carbide_off_hours_check` \
| eval on_hours_since = case( \
    is_off_hours=1,                        null(), \
    coalesce(previous_status,"")="OFF_HOURS", now(), \
    isnotnull(on_hours_since),             on_hours_since, \
    1=1,                                   null() \
) \
| eval _grace_secs = if(coalesce(offhours_grace_seconds,0) > 0, offhours_grace_seconds, `carbide_default_offhours_grace`) \
| eval in_offhours_grace = if(is_off_hours=0 AND isnotnull(on_hours_since) AND (now() - on_hours_since) < _grace_secs, 1, 0) \
| eval status = case( \
    in_maintenance=1,                                                        "MAINT", \
    is_off_hours=1,                                                          "OFF_HOURS", \
    in_grace=1,                                                              "NEW", \
    in_offhours_grace=1,                                                     "SETTLING", \
    isnull(last_event_time),                                                 "DOWN", \
    current_gap > max_gap_seconds AND current_latency > max_latency_seconds, "CRITICAL", \
    current_gap > max_gap_seconds,                                           "DOWN", \
    current_latency > max_latency_seconds,                                   "LATE", \
    coalesce(min_volume_pct,0) > 0 AND coalesce(baseline_epc,0) > 0 AND event_count < baseline_epc * min_volume_pct / 100, "LOW_VOLUME", \
    1=1,                                                                     "OK" \
) \
| eval entity_type = "source" \
| table _key, entity_type, entity_key, tracking_mode, index, source, sourcetype, \
        monitored, max_latency_seconds, max_gap_seconds, min_volume_pct, baseline_epc, maintenance_from, maintenance_until, \
        monitoring_schedule, is_off_hours, tags, reviewed, offhours_grace_seconds, on_hours_since, \
        last_event_time, current_latency, current_gap, \
        event_count, status, in_maintenance, first_seen, last_updated, \
        previous_status, previous_last_event_time, notes

###
### --- Cached status (reads KV, no tstats) ----------------------------------
### Returns the same conceptual rows as carbide_host_status / _source_status,
### but pulls last_status / last_event_time / last_latency from the KV row
### the snapshot writeback maintains. No tstats invocation, no entity_filter
### subsearch - costs the equivalent of a single inputlookup. Use this from
### alerts and from anything that runs on a high frequency (Home, Overview,
### per-tab refreshes). Up to one snapshot-cycle (default 5 minutes) stale.
###
### MAINT is re-derived at read time, so an expired maintenance window
### resolves correctly without waiting for the next snapshot.
###

[carbide_cached_host_status]
definition = inputlookup carbide_tracked_hosts_lookup where monitored=1 \
| eval status_persisted = coalesce(last_status, "NEW") \
| eval current_gap     = if(isnull(last_event_time) OR last_event_time=0, 9999999, now() - last_event_time) \
| eval current_latency = coalesce(last_latency, 0) \
| eval in_maintenance  = if(coalesce(maintenance_from,0) <= now() AND coalesce(maintenance_until,0) > now(), 1, 0) \
| `carbide_off_hours_check` \
| eval status = case(in_maintenance=1, "MAINT", is_off_hours=1, "OFF_HOURS", 1=1, status_persisted) \
| eval entity_type = "host" \
| lookup carbide_assets_lookup host OUTPUTNEW criticality AS asset_criticality, owner AS asset_owner, business_unit AS asset_bu

[carbide_cached_source_status]
definition = inputlookup carbide_tracked_sources_lookup where monitored=1 \
| eval status_persisted = coalesce(last_status, "NEW") \
| eval current_gap     = if(isnull(last_event_time) OR last_event_time=0, 9999999, now() - last_event_time) \
| eval current_latency = coalesce(last_latency, 0) \
| eval in_maintenance  = if(coalesce(maintenance_from,0) <= now() AND coalesce(maintenance_until,0) > now(), 1, 0) \
| `carbide_off_hours_check` \
| eval status = case(in_maintenance=1, "MAINT", is_off_hours=1, "OFF_HOURS", 1=1, status_persisted) \
| eval entity_type = "source"

### Combined cached status - reads BOTH tracked-host and tracked-source rows.
### Uses `union` at the top so both branches are independent generating
### subsearches; then applies the shared status-derivation evals once.
### Historically this was `append [ | inputlookup ... ]`, but Splunk 10.4's
### parser rejects that shape at dispatch time with the misleading
### "inputlookup must be the first command" error; `union` doesn't have
### that regression.
[carbide_cached_status]
definition = union \
    [ | inputlookup carbide_tracked_hosts_lookup   where monitored=1 | eval entity_type = "host" ] \
    [ | inputlookup carbide_tracked_sources_lookup where monitored=1 | eval entity_type = "source" ] \
| eval status_persisted = coalesce(last_status, "NEW") \
| eval current_gap     = if(isnull(last_event_time) OR last_event_time=0, 9999999, now() - last_event_time) \
| eval current_latency = coalesce(last_latency, 0) \
| eval in_maintenance  = if(coalesce(maintenance_from,0) <= now() AND coalesce(maintenance_until,0) > now(), 1, 0) \
| `carbide_off_hours_check` \
| eval status = case(in_maintenance=1, "MAINT", is_off_hours=1, "OFF_HOURS", 1=1, status_persisted) \
| eval host = coalesce(host, "-") \
| lookup carbide_assets_lookup host OUTPUTNEW criticality AS asset_criticality, owner AS asset_owner, business_unit AS asset_bu \
| eval asset_criticality = if(entity_type="host", asset_criticality, null()) \
| eval asset_owner       = if(entity_type="host", asset_owner,       null()) \
| eval asset_bu          = if(entity_type="host", asset_bu,          null())

###
### --- Threshold suggestions -----------------------------------------------
### Per-tracked host entity, computes recommended max_latency_seconds and
### max_gap_seconds from the past 7 days of indexed metadata:
###
###   suggested_max_latency = round(P95(latency) * 1.5)
###     latency = latest(_indextime) - max(_time) per tracked slice over 7d
###     (one sample per slice; tstats forbids per-event latency aggs -- see
###     the status-macro notes). P95 is computed across slices in stats.
###   suggested_max_gap     = round(avg_interval * 5)  where
###                                avg_interval = (max(_time)-min(_time))/count
###
### The constants (1.5x, 5x) are deliberately conservative -- the goal is to
### propose a threshold that's well above normal but still catches real
### outages. Used by the Threshold Suggestions dashboard, which surfaces
### current-vs-suggested side-by-side with an Apply button per row.
###

[carbide_threshold_suggestions_hosts]
definition = inputlookup carbide_tracked_hosts_lookup where monitored=1 \
| append [ \
    | tstats \
        max(_time) as live_max_time, \
        min(_time) as live_min_time, \
        count      as live_event_count, \
        latest(_indextime) as live_latest_indextime \
        where `carbide_entity_filter("hosts")` AND index!=`carbide_index` \
              AND [ | inputlookup carbide_tracked_hosts_lookup where monitored=1 \
                    | table index, host, source, sourcetype \
                    | append [ | makeresults | eval host = "__carbide_no_monitored_entities__" | table host ] \
                    | format ] \
              earliest=-7d@h \
        by index, host, sourcetype, source \
    | eval live_latency = max(0, live_latest_indextime - live_max_time) \
    | eval ek_ih  = "index=".index."|host=".host \
    | eval ek_hs  = "host=".host."|source=".source \
    | eval ek_hst = "host=".host."|sourcetype=".sourcetype \
    | eval entity_key = mvappend(ek_ih, ek_hs, ek_hst) \
    | mvexpand entity_key \
    | fields entity_key, live_* \
    | stats \
        max(live_max_time)    as live_max_time, \
        min(live_min_time)    as live_min_time, \
        sum(live_event_count) as live_event_count, \
        p95(live_latency)     as live_p95_latency \
        by entity_key \
] \
| stats \
    values(_key) as _key, \
    values(max_latency_seconds) as current_max_latency, \
    values(max_gap_seconds)     as current_max_gap, \
    max(live_max_time)          as max_time, \
    min(live_min_time)          as min_time, \
    sum(live_event_count)       as event_count, \
    max(live_p95_latency)       as p95_latency \
    by entity_key \
| where isnotnull(_key) AND event_count > 0 \
| eval avg_interval        = if(event_count<=1, null(), (max_time - min_time) / (event_count - 1)) \
| eval suggested_max_latency = round(coalesce(p95_latency, 0) * 1.5, 0) \
| eval suggested_max_gap     = round(coalesce(avg_interval, 0) * 5, 0) \
| eval delta_max_latency = suggested_max_latency - coalesce(current_max_latency, 0) \
| eval delta_max_gap     = suggested_max_gap     - coalesce(current_max_gap, 0) \
| table _key, entity_key, current_max_latency, suggested_max_latency, delta_max_latency, current_max_gap, suggested_max_gap, delta_max_gap, event_count, p95_latency, avg_interval

[carbide_threshold_suggestions_sources]
definition = inputlookup carbide_tracked_sources_lookup where monitored=1 \
| append [ \
    | tstats \
        max(_time) as live_max_time, \
        min(_time) as live_min_time, \
        count      as live_event_count, \
        latest(_indextime) as live_latest_indextime \
        where `carbide_entity_filter("sources")` AND index!=`carbide_index` \
              AND [ | inputlookup carbide_tracked_sources_lookup where monitored=1 \
                    | table index, source, sourcetype \
                    | append [ | makeresults | eval index = "__carbide_no_monitored_entities__" | table index ] \
                    | format ] \
              earliest=-7d@h \
        by index, source, sourcetype \
    | eval live_latency = max(0, live_latest_indextime - live_max_time) \
    | eval ek_is  = "index=".index."|source=".source \
    | eval ek_ist = "index=".index."|sourcetype=".sourcetype \
    | eval entity_key = mvappend(ek_is, ek_ist) \
    | mvexpand entity_key \
    | fields entity_key, live_* \
    | stats \
        max(live_max_time)    as live_max_time, \
        min(live_min_time)    as live_min_time, \
        sum(live_event_count) as live_event_count, \
        p95(live_latency)     as live_p95_latency \
        by entity_key \
] \
| stats \
    values(_key) as _key, \
    values(max_latency_seconds) as current_max_latency, \
    values(max_gap_seconds)     as current_max_gap, \
    max(live_max_time)          as max_time, \
    min(live_min_time)          as min_time, \
    sum(live_event_count)       as event_count, \
    max(live_p95_latency)       as p95_latency \
    by entity_key \
| where isnotnull(_key) AND event_count > 0 \
| eval avg_interval        = if(event_count<=1, null(), (max_time - min_time) / (event_count - 1)) \
| eval suggested_max_latency = round(coalesce(p95_latency, 0) * 1.5, 0) \
| eval suggested_max_gap     = round(coalesce(avg_interval, 0) * 5, 0) \
| eval delta_max_latency = suggested_max_latency - coalesce(current_max_latency, 0) \
| eval delta_max_gap     = suggested_max_gap     - coalesce(current_max_gap, 0) \
| table _key, entity_key, current_max_latency, suggested_max_latency, delta_max_latency, current_max_gap, suggested_max_gap, delta_max_gap, event_count, p95_latency, avg_interval

###
### --- Friendly status (plain English + icon) -------------------------------
### Adds status_h with a human-readable label such as "Healthy" / "Delayed".
### Dashboards display status_h while keeping the internal `status` field for
### filtering and color mapping. Color map in views uses status_h directly.
###

[carbide_friendly_status]
definition = eval status_h = case( \
    status="OK",        "✓ Healthy", \
    status="LATE",      "⚠ Delayed", \
    status="DOWN",      "✗ Missing data", \
    status="CRITICAL",  "✗ Missing + delayed", \
    status="LOW_VOLUME","📉 Low volume", \
    status="SETTLING",  "🌅 Settling", \
    status="MAINT",     "🔧 Snoozed", \
    status="OFF_HOURS", "🌙 Off-hours", \
    status="NEW",       "⏳ Waiting for first check", \
    1=1,                status \
)

###
### --- Friendly duration formatting -----------------------------------------
### Adds <field>_h with a humanised duration ("12.4 m", "3.1 h", ...) for a
### value in seconds. Used in dashboards.
###

[carbide_humanize_duration(1)]
args = field
definition = eval $field$_h = case( \
    isnull($field$) OR $field$<=0, "-", \
    $field$ < 60,                  round($field$,0)." s", \
    $field$ < 3600,                round($field$/60,1)." m", \
    $field$ < 86400,               round($field$/3600,1)." h", \
    1=1,                           round($field$/86400,1)." d" \
)

###
### --- Friendly "in X" formatting for a future epoch ------------------------
### Adds <field>_h with "-" / "expired" / "in 2.1h" etc. Used in dashboards
### for maintenance_until.
###

[carbide_humanize_until(1)]
args = field
definition = eval $field$_h = case( \
    isnull($field$) OR $field$<=0,   "-", \
    $field$ < now(),                 "expired", \
    ($field$-now()) < 60,            "in ".round($field$-now(),0)."s", \
    ($field$-now()) < 3600,          "in ".round(($field$-now())/60,1)."m", \
    ($field$-now()) < 86400,         "in ".round(($field$-now())/3600,1)."h", \
    1=1,                             "in ".round(($field$-now())/86400,1)."d" \
)
