###
### Carbide for Splunk - lookup definitions
###
### Each KV Store collection is exposed as a lookup so it can be referenced
### from SPL via `| lookup`, `| inputlookup`, `| outputlookup`.
###

[carbide_tracked_hosts_lookup]
external_type = kvstore
collection    = carbide_tracked_hosts
fields_list   = _key, entity_key, index, host, source, sourcetype, tracking_mode, monitored, max_latency_seconds, max_gap_seconds, first_seen, last_updated, last_status, last_event_time, last_latency, notes, maintenance_from, maintenance_until, monitoring_schedule, tags, min_volume_pct, baseline_epc

[carbide_tracked_sources_lookup]
external_type = kvstore
collection    = carbide_tracked_sources
fields_list   = _key, entity_key, index, source, sourcetype, tracking_mode, monitored, max_latency_seconds, max_gap_seconds, first_seen, last_updated, last_status, last_event_time, last_latency, notes, maintenance_from, maintenance_until, monitoring_schedule, tags, min_volume_pct, baseline_epc

[carbide_entity_filters_lookup]
external_type = kvstore
collection    = carbide_entity_filters
fields_list   = _key, field_name, pattern, mode, tracking_type, notes

[carbide_assets_lookup]
external_type = kvstore
collection    = carbide_assets
fields_list   = _key, host, criticality, owner, business_unit, notes, source

[carbide_holidays_lookup]
external_type = kvstore
collection    = carbide_holidays
fields_list   = _key, date, name, recurring, notes

[carbide_holidays_seed]
filename = carbide_holidays_seed.csv

#
# CSV-backed read-only seed lookup (lookups/carbide_entity_filters_seed.csv).
# Used by the "Carbide - Seed Entity Filters" saved search to populate
# carbide_entity_filters on first install. Upgrades replace the CSV; the
# KV-store collection it seeds is runtime data and is never touched. To
# re-apply the latest seed rules after an upgrade, manually run the seed
# search OR clear the carbide_entity_filters collection first.
#
[carbide_entity_filters_seed]
filename = carbide_entity_filters_seed.csv

#
# Auto-watch rule matching. WILDCARD match_type makes the KV lookup treat
# the *_pattern fields in the collection as wildcard patterns matched
# against the incoming entity's values. max_matches=1 = first match wins.
#
[carbide_autowatch_lookup]
external_type = kvstore
collection    = carbide_autowatch_rules
fields_list   = _key, rule_name, scope_pattern, index_pattern, host_pattern, source_pattern, sourcetype_pattern, watch, monitoring_schedule, max_gap_seconds, max_latency_seconds, min_volume_pct, tags, notes
match_type    = WILDCARD(scope_pattern), WILDCARD(index_pattern), WILDCARD(host_pattern), WILDCARD(source_pattern), WILDCARD(sourcetype_pattern)
max_matches   = 1
