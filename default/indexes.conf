###
### Carbide for Splunk - dedicated index
###
### Status snapshots written by `Carbide - Status Snapshot: *` land in this
### index. Keeping them out of `summary` means trending queries can scope
### tightly (faster) and retention can be tuned independently.
###
### IMPORTANT
### ---------
### `indexes.conf` is honored on Splunk indexers, NOT on standalone search
### heads. In a distributed deployment, also install this app (or just this
### single file) on every indexer / on the cluster master.
###
### Defaults below: 90 days hot/warm, 5 GB cap. Tune for your environment.
###

[carbide]
homePath               = $SPLUNK_DB/carbide/db
coldPath               = $SPLUNK_DB/carbide/colddb
thawedPath             = $SPLUNK_DB/carbide/thaweddb
# 90 days retention
frozenTimePeriodInSecs = 7776000
# 5 GB cap
maxTotalDataSizeMB     = 5120
# Carbide writes one event per monitored entity per snapshot (~every 5 min).
# Bucket size kept small because the volume is small and we benefit from
# fast time-range queries.
maxHotBuckets          = 3
maxDataSize            = auto
