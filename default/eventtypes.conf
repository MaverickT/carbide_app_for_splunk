###
### Carbide for Splunk - eventtypes
###

# CIM Alerts: every Carbide transition or heartbeat is an alert in the CIM
# sense. tagged with `alert` via tags.conf so it shows up in ES Alerts
# dashboards and any tag=alert correlation search out of the box.
[carbide_cim_alert]
search = sourcetype="carbide:status" index=`carbide_index`
