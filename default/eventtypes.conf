###
### Carbide for Splunk - eventtypes
###

# CIM Alerts: every Carbide transition or heartbeat is an alert in the CIM
# sense. Tagged with `alert` via tags.conf so it shows up in ES Alerts
# dashboards and any tag=alert correlation search out of the box.
#
# The index is hardcoded (not `carbide_index`) because eventtype definitions
# do not expand search macros. If you rename the index, update this stanza
# in local/eventtypes.conf along with the carbide_index macro, and
# recreate the index under the new name.
[carbide_cim_alert]
search = sourcetype="carbide:status" index=carbide
