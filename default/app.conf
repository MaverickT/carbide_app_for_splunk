#
# Carbide App for Splunk
# Lightweight data-source gap & latency monitor
#

[install]
state = enabled
# Carbide has no setup phase: discovery seeds itself, the Home page's
# Welcome cards walk first-time users through the bootstrap, and Settings
# exposes optional overrides. With no setup page there is no
# "unconfigured" banner, and Splunkbase requires shipping this as false.
is_configured = false
build = 31

[id]
name = carbide_app_for_splunk
version = 1.6.0

[ui]
is_visible = true
label = Carbide App for Splunk
docs_section_override = manager/apps

[launcher]
author = Ziga Humar
version = 1.6.0
description = Detect when monitored hosts, sources or sourcetypes stop reporting. Per-entity latency and gap thresholds, inline configuration, bulk actions, maintenance windows, tstats-powered discovery, change-only history, alerts.

[package]
id = carbide_app_for_splunk
check_for_updates = true

# No [triggers] stanza: it may only list CUSTOM conf files (AppInspect
# check_for_trigger_stanza). Splunk reloads the standard confs this app
# uses (collections, transforms, macros, savedsearches) through its own
# endpoints - use debug/refresh after a manual deploy as usual.
