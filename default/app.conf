#
# Carbide App for Splunk
# Lightweight data-source gap & latency monitor
#

[install]
state = enabled
# Carbide doesn't require a one-time setup phase. Discovery seeds itself,
# the Home page's Welcome cards walk first-time users through the
# bootstrap, and Settings exposes optional overrides. Marking the app as
# "configured" out of the box dismisses Splunk's persistent "not yet
# configured" banner. If an admin wants the banner back, flip this to
# false in local/app.conf.
is_configured = true
build = 22

[ui]
is_visible = true
label = Carbide App for Splunk
docs_section_override = manager/apps

[launcher]
author = Ziga Humar
version = 1.4.0
description = Detect when monitored hosts, sources or sourcetypes stop reporting. Per-entity latency and gap thresholds, inline configuration, bulk actions, maintenance windows, tstats-powered discovery, change-only history, alerts.

[package]
id = carbide_app_for_splunk
check_for_updates = false

[triggers]
reload.carbide_tracked_hosts        = simple
reload.carbide_tracked_sources      = simple
reload.carbide_entity_filters       = simple
reload.carbide_autowatch_rules      = simple
reload.collections                  = simple
reload.transforms                   = access_endpoints /admin/transforms-lookup
reload.macros                       = simple
reload.savedsearches                = access_endpoints /admin/savedsearch
