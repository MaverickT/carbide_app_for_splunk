###
### Carbide App for Splunk - workflow actions
###
### Field-level link from ANY event carrying entity_key (ES Incident Review
### notable details, carbide:status events in raw search, ...) to the
### Carbide entity page. This is the reliable way to reach a dashboard from
### an ES notable: notable drilldown params can only launch searches.
### $entity_key$ is URL-encoded automatically by the workflow-action
### framework (use $!field$ to opt out - we don't).
###

[carbide_open_entity]
type = link
label = Open in Carbide (entity page)
fields = entity_key
display_location = both
link.method = get
link.target = blank
link.uri = /app/carbide_app_for_splunk/entity?entity_key=$entity_key$
