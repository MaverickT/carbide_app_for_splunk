###
### Carbide for Splunk - sourcetype parsing
###
### The status-snapshot saved searches write events to the dedicated
### `carbide_index` (default `carbide`) with
### `_raw = entity_key="..." entity_type=... status=...`. Auto-KV picks
### these fields up at search time; we only need to set the timestamp
### config (snapshots stamp _time to "now" via the search itself, so
### TIME_FORMAT is unused here).
###

[carbide:status]
SHOULD_LINEMERGE  = false
LINE_BREAKER      = ([\r\n]+)
KV_MODE           = auto
TRUNCATE          = 0
disabled          = false

###
### CIM Alerts data model alignment
###
### Maps the fields Carbide ships in carbide:status events to the Splunk
### Common Information Model `Alerts` data model. Once these aliases and
### evals are in place, the status events show up wherever a CIM-aware
### search runs (ES Alerts dashboards, generic correlation searches that
### key on tag=alert, the SA-CommonInformationModel data model).
###
### Field mapping rationale:
###   - entity_key       -> dest        (the affected asset)
###   - entity_key       -> signature   (the alert subject line)
###   - status           -> type        (alarm vs warning vs informational)
###   - status           -> severity    (impact-based)
###   - status           -> severity_id  (derived from impact)
###
FIELDALIAS-cim_dest         = entity_key AS dest
FIELDALIAS-cim_subject      = entity_key AS subject
FIELDALIAS-cim_signature    = entity_key AS signature
FIELDALIAS-cim_signature_id = entity_key AS signature_id
EVAL-app                    = "carbide_app_for_splunk"
EVAL-vendor_product         = "Carbide for Splunk"
EVAL-type                   = case(status="CRITICAL","alarm", status="DOWN","alarm", status="LATE","warning", status="MAINT","informational", 1=1,"informational")
EVAL-severity               = case(status="CRITICAL","critical", status="DOWN","high", status="LATE","medium", status="MAINT","informational", 1=1,"low")
EVAL-severity_id            = case(status="CRITICAL",5, status="DOWN",4, status="LATE",3, status="MAINT",1, 1=1,2)
EVAL-id                     = entity_key . ":" . status
